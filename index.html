<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison Noire Beauty</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, sans-serif;
      background: #080808;
      color: #f6f1e7;
      line-height: 1.5;
    }

    a {
      text-decoration: none;
    }

    .topbar {
      background: linear-gradient(90deg, #7d5b1f, #d4af37, #7d5b1f);
      color: #111;
      text-align: center;
      padding: 12px 14px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .hero {
      min-height: 90vh;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.78)),
        url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 18px;
    }

    .hero-box {
      max-width: 900px;
      background: rgba(10,10,10,0.5);
      border: 1px solid rgba(212,175,55,0.30);
      border-radius: 28px;
      padding: 34px 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
    }

    .mini {
      color: #d4af37;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
      font-weight: bold;
    }

    .hero h1 {
      font-family: Georgia, serif;
      font-size: 42px;
      line-height: 1.1;
      color: #fff3cf;
      margin-bottom: 16px;
    }

    .hero p {
      max-width: 700px;
      margin: 0 auto 24px;
      color: #e6dcc5;
      font-size: 16px;
      line-height: 1.8;
    }

    .hero-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-gold,
    .btn-dark,
    .buy-btn,
    .gallery-btn {
      display: inline-block;
      font-weight: bold;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .btn-gold {
      background: linear-gradient(135deg, #8a6a2f, #d4af37);
      color: #111;
      padding: 14px 24px;
      box-shadow: 0 10px 25px rgba(212,175,55,0.28);
    }

    .btn-dark {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(212,175,55,0.3);
      padding: 14px 24px;
    }

    .container {
      max-width: 1220px;
      margin: 0 auto;
      padding: 50px 16px 70px;
    }

    .section-head {
      text-align: center;
      margin-bottom: 28px;
    }

    .section-head h2 {
      font-family: Georgia, serif;
      color: #d4af37;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .section-head p {
      color: #d9cfbb;
      font-size: 15px;
    }

    .product-card {
      background: linear-gradient(180deg, #101010, #161616);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 32px rgba(0,0,0,0.34);
      margin-bottom: 26px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 0;
    }

    .gallery {
      padding: 18px;
      background: #0d0d0d;
      border-right: 1px solid rgba(212,175,55,0.10);
    }

    .main-photo img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      margin-bottom: 14px;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .thumbs img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      border: 1px solid rgba(212,175,55,0.14);
    }

    .details {
      padding: 22px;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(212,175,55,0.10);
      border: 1px solid rgba(212,175,55,0.22);
      color: #f3d98b;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .details h3 {
      font-family: Georgia, serif;
      color: #fff2ca;
      font-size: 30px;
      margin-bottom: 10px;
    }

    .details p {
      color: #d9cfbb;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .benefits {
      margin: 14px 0 16px 18px;
      color: #e8dec7;
    }

    .benefits li {
      margin-bottom: 6px;
    }

    .old-price {
      color: #8d8475
