<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins;
background:#fff8fb;
margin:0;
}

.logo{
font-size:32px;
font-weight:800;
background:linear-gradient(90deg,#ff4fa3,#ffd54f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-weight:700;
margin-bottom:8px;
}

.price{
font-size:20px;
font-weight:800;
color:#000;
}

.old{
text-decoration:line-through;
color:#888;
font-size:13px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff4fa3,#ff8a5b);
color:#fff;
font-weight:700;
}
</style>
</head>

<body>

<div class="logo">Luxury Beauty</div>

<div class="products" id="products"></div>

<script>

const products = [

{
title:"La Roche Effaclar Gel",
price:"R$ 89,90",
old:"R$ 99,90",
image:"https://images.unsplash.com/photo-1571781926291-c477ebfd024b"
},

{
title:"La Roche Anthelios FPS70",
price:"R$ 82,90",
old:"R$ 97,90",
image:"https://images.unsplash.com/photo-1556228578-0d85b1a4d571"
},

{
title:"Principia Niacinamida",
price:"R$ 59,90",
old:"R$ 69,90",
image:"https://images.unsplash.com/photo-1620916566398-39f1143ab7be"
},

{
title:"Principia Ácido Hialurônico",
price:"R$ 64,90",
old:"R$ 74,90",
image:"https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd"
},

{
title:"Lancôme Génifique Sérum",
price:"R$ 399,90",
old:"R$ 459,90",
image:"https://images.unsplash.com/photo-1570194065650-d99fb4bedf0f"
},

{
title:"Creamy Retinol",
price:"R$ 99,90",
old:"R$ 119,90",
image:"https://images.unsplash.com/photo-1601612628452-9e99ced43524"
},

{
title:"Escova Secadora Philco",
price:"R$ 189,90",
old:"R$ 229,90",
image:"https://images.unsplash.com/photo-1522337660859-02fbefca4702"
},

{
title:"Chapinha Gama",
price:"R$ 159,90",
old:"R$ 189,90",
image:"https://images.unsplash.com/photo-1527799820374-dcf8d9d4a388"
},

{
title:"Secador Profissional",
price:"R$ 249,90",
old:"R$ 299,90",
image:"https://images.unsplash.com/photo-1515377905703-c4788e51af15"
},

{
title:"Escova Rotativa",
price:"R$ 179,90",
old:"R$ 219,90",
image:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1"
}

];

const container = document.getElementById("products");

products.forEach(p=>{
container.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="info">
<div class="title">${p.title}</div>
<div class="price">${p.price}</div>
<div class="old">${p.old}</div>
<button>Comprar</button>
</div>
</div>
`;
});

</script>

</body>
</html>
